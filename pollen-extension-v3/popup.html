<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>花粉チェッカー Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #222222;
      --border:    rgba(255,255,255,0.07);
      --cedar:     #e8a03a;
      --cypress:   #6cc97a;
      --grass:     #5aafd4;
      --weed:      #b07ad4;
      --danger:    #e05252;
      --warn:      #e8c03a;
      --ok:        #52c07a;
      --text:      #f0ede8;
      --muted:     rgba(240,237,232,0.45);
      --dim:       rgba(240,237,232,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Kiwi Maru', serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: baseline; gap: 7px; }
    .logo-title {
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 800; letter-spacing: 0.02em;
    }
    .logo-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--cedar);
      background: rgba(232,160,58,0.12);
      border: 1px solid rgba(232,160,58,0.3);
      padding: 2px 6px; border-radius: 3px;
    }

    /* Search */
    .search-wrap { padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .search-row { display: flex; gap: 8px; }
    .city-input {
      flex: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 13px;
      color: var(--text); font-family: 'Kiwi Maru', serif;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .city-input:focus { border-color: rgba(232,160,58,0.5); }
    .city-input::placeholder { color: var(--dim); font-size: 12px; }
    .search-btn {
      background: var(--cedar); color: #0f0f0f;
      border: none; border-radius: 8px; padding: 9px 16px;
      font-family: 'Kiwi Maru', serif;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* States */
    .state { padding: 36px 18px; text-align: center; }
    .state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .state-text { font-size: 12px; color: var(--muted); line-height: 1.7; }

    /* Loading */
    .loading-wrap { padding: 40px 18px; text-align: center; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--cedar);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; color: var(--muted); }

    /* Error */
    .error-wrap {
      margin: 16px 18px;
      background: rgba(224,82,82,0.08); border: 1px solid rgba(224,82,82,0.25);
      border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: #e07070; line-height: 1.6;
    }

    /* Result */
    .location-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px 10px; border-bottom: 1px solid var(--border);
    }
    .location-name { font-family: 'Nunito', 'Kiwi Maru', serif; font-size: 16px; font-weight: 700; }
    .location-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .forecast-note { font-size: 10px; color: var(--muted); }

    /* Date tabs */
    .date-tabs {
      display: flex; padding: 10px 18px 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .date-tabs::-webkit-scrollbar { display: none; }
    .date-tab {
      flex-shrink: 0; padding: 6px 12px;
      border-radius: 6px 6px 0 0;
      font-size: 11px; color: var(--muted);
      cursor: pointer;
      border: 1px solid transparent; border-bottom: none;
      background: none; font-family: 'Kiwi Maru', serif;
      transition: color 0.15s, background 0.15s;
    }
    .date-tab:hover { color: var(--text); }
    .date-tab.active {
      color: var(--text); background: var(--surface);
      border-color: var(--border);
    }

    /* Day panel */
    .day-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 0 8px 8px 8px;
      margin: 0 18px; padding: 14px;
    }

    /* Overall */
    .overall-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .overall-emoji { font-size: 32px; line-height: 1; }
    .overall-right { flex: 1; }
    .overall-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 2px; }
    .overall-level { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; line-height: 1; }
    .overall-desc { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .col-none     { color: var(--ok); }
    .col-low      { color: #8fd46a; }
    .col-moderate { color: var(--warn); }
    .col-high     { color: var(--cedar); }
    .col-veryhigh { color: var(--danger); }

    /* Pollen grid */
    .pollen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pollen-card {
      background: var(--surface2); border-radius: 8px; padding: 10px 12px;
      border: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .pollen-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .pollen-card.cedar::before   { background: var(--cedar); }
    .pollen-card.cypress::before { background: var(--cypress); }
    .pollen-card.grass::before   { background: var(--grass); }
    .pollen-card.weed::before    { background: var(--weed); }
    .pollen-card-name {
      font-size: 10px; color: var(--muted); margin-bottom: 4px;
      display: flex; align-items: center; gap: 5px;
    }
    .pollen-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pollen-card-level { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; line-height: 1; }
    .pollen-card-upi { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .mini-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

    /* Health tip */
    .health-tip {
      margin-top: 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 11px; color: var(--muted); line-height: 1.65;
    }
    .health-tip-title { font-size: 10px; font-weight: 700; color: var(--cedar); letter-spacing: 0.06em; margin-bottom: 5px; }

    /* Footer */
    .footer {
      padding: 8px 18px; display: flex; justify-content: space-between;
      align-items: center; border-top: 1px solid var(--border); margin-top: 10px;
    }
    .footer-text { font-size: 9px; color: var(--dim); letter-spacing: 0.04em; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s ease forwards; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-title">花粉チェッカー</span>
    <span class="logo-badge">PRO</span>
  </div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <input class="city-input" id="cityInput" type="text"
           placeholder="例：港区、和光市、大阪市北区…" autocomplete="off" />
    <button class="search-btn" id="searchBtn">調べる</button>
  </div>
</div>

<div id="initialSection" class="state">
  <div class="state-icon">🌿</div>
  <div class="state-text">市区町村名を入力すると<br>スギ・ヒノキを含む花粉予報を表示します</div>
</div>

<div id="loadingSection" class="loading-wrap hidden">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">花粉データを取得中…</div>
</div>

<div id="errorSection" class="hidden">
  <div class="error-wrap" id="errorMsg"></div>
</div>

<div id="resultSection" class="hidden">
  <div class="location-bar">
    <div>
      <div class="location-name" id="locName"></div>
      <div class="location-sub" id="locSub"></div>
    </div>
    <div class="forecast-note">5日間予報</div>
  </div>
  <div class="date-tabs" id="dateTabs"></div>
  <div class="day-panel" id="dayPanel">
    <div class="overall-row">
      <div class="overall-emoji" id="overallEmoji"></div>
      <div class="overall-right">
        <div class="overall-label">総合花粉レベル</div>
        <div class="overall-level" id="overallLevel"></div>
        <div class="overall-desc" id="overallDesc"></div>
      </div>
    </div>
    <div class="pollen-grid" id="pollenGrid"></div>
    <div class="health-tip hidden" id="healthTip">
      <div class="health-tip-title">💡 健康アドバイス</div>
      <div id="healthTipText"></div>
    </div>
  </div>
</div>

<div class="footer">
  <span class="footer-text">Powered by Google Pollen API</span>
  <span class="footer-text" id="footerDate"></span>
</div>

<script src="popup.js"></script>
</body>
</html>
