<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>勤怠トラッカー</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <h1>勤怠トラッカー</h1>

    <div id="userIdSection">
      <label for="userIdInput">ChatworkユーザーID</label>
      <div id="userIdRow">
        <input type="text" id="userIdInput" placeholder="例: 10808330" />
        <button id="saveUserIdBtn">保存</button>
      </div>
      <p id="userIdHint" class="hint">Chatworkのタブのコンソールで <code>window.MYID</code> を実行して確認できます</p>
    </div>

    <div id="controls">
      <select id="yearSelect"></select>
      <span>年</span>
      <select id="monthSelect"></select>
      <span>月</span>
      <button id="fetchBtn">取得</button>
      <button id="forceFetchBtn">強制取得</button>
    </div>

    <div id="status" class="hidden"></div>

    <div id="tableWrapper" class="hidden">
      <table id="attendanceTable">
        <thead>
          <tr>
            <th>日付</th>
            <th>出勤</th>
            <th>退勤</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <p class="hint">時間をクリックするとHHMMでコピーされます</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
